name: Deploy PMO ERP to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      ENTRYPOINT: ${{ vars.DEPLOY_ENTRYPOINT || 'resource_standalone.html' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Validate deployment configuration
        run: |
          test -n "$SUPABASE_URL" || (echo "Missing repository variable SUPABASE_URL" && exit 1)
          test -n "$SUPABASE_ANON_KEY" || (echo "Missing repository variable SUPABASE_ANON_KEY" && exit 1)
          test -f "$ENTRYPOINT" || (echo "Entrypoint $ENTRYPOINT does not exist" && exit 1)
      - name: Build static artifact
        run: |
          node scripts/generate-config.mjs config.js
          mkdir -p dist
          cp *.html *.js *.css dist/
          test ! -d views || cp -R views dist/views
          cp "$ENTRYPOINT" dist/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
